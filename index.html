    <script>
      const faixa = document.querySelector(".aoredor-img-carro-secao");
      const slides = document.querySelectorAll(".aoredor-img-carro-secao img");

      let index = 0;
      const total = slides.length;

      /* mover carrossel */
      function atualizar() {
        faixa.style.transform = `translateX(-${index * 100}%)`;
      }

      /* próximo */
      function proximo() {
        index = (index + 1) % total;
        atualizar();
      }

      /* anterior */
      function anterior() {
        index = (index - 1 + total) % total;
        atualizar();
      }

      /* auto slide devagar */
      setInterval(proximo, 4000);

      /* botões */
      document.querySelector(".direita").onclick = proximo;
      document.querySelector(".esquerda").onclick = anterior;
    </script>
