<!doctype html>

      <div class="cont-sect-01">

          <div class="sub-cont-header">
            <h1 class="title-section-01">aluguéis de apartamentos por temporada</h1>
            <img src="Icons/icon-casa-title.png" alt="" />
          </div>
          <div class="item-img-logo">
            <img src="Imagens/LOGO P&S HOME.png" alt="" />
          </div>
          <div class="title-text-center">
            <img src="Imagens/TXT SINTA-SE EM CASA.png" alt="Sinta-se em casa" />

        </div>
        <div id="carrossel-hero">
          <div class="box-img-hero">
            <img class="slide" src="Imagens/img4.jpeg" />
            <img class="slide" src="Imagens/img2.jpeg" />
            <img class="slide" src="Imagens/img3.jpeg" />

            <img class="slide" src="Imagens/img4.jpeg" />

            <img class="slide" src="Imagens/img3.jpeg" />
            <!--?(IMG) Repeat for loop (HERO)-->
          </div>
        </div>
        <div class="cont-itens-info">
          <div class="sub-cont-info">
            <div class="itens-info">
              <img src="Icons/icon-01-blocoBaixo.png" alt="">

                <br>
                <span>e climatizado</span>

            </div>
            <div class="itens-info">
              <img src="Icons/icon-03-blocoBaixo.png" alt="">

              </div>  
            </div>
            <div class="itens-info">
              <img src="Icons/icon-04-blocoBaixo.png" alt="">
              <div class="text-cont-info">
                <span>Roupas de</span>
                <br>
                <span>cama e banho</span>
              </div>
            </div>
            <div class="itens-info">
              <img src="Icons/icon-05-blocoBaixo.png" alt="">
              <div class="text-cont-info">
                <span>Campo Novo</span>
                <br>
                <span>do Parecis-mt</span>
              </div>
